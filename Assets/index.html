<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVO Pathfinding - WebGL 2.0 GPGPU Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }
        h1 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 2px;
            color: #ffd166;
        }
        .subtitle {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
        }
        .main-container {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1100px;
        }
        .viz-container {
            position: relative;
            background: #1a1a2e;
            border-radius: 8px;
            overflow: hidden;
            flex: 1 1 700px;
            min-width: 500px;
            height: 600px;
        }
        #vizCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #glCanvas {
            display: none;
        }
        .mode-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            color: #ffd166;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            pointer-events: none;
            z-index: 10;
        }
        .sidebar {
            width: 240px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }
        .panel {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.78rem;
            line-height: 1.5;
        }
        .panel b { color: #ffd166; }
        .panel hr { border: none; border-top: 1px solid #333; margin: 6px 0; }
        .controls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        button {
            background: #2b2d42;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #3d3f5c; }
        button:active { background: #4a4c6b; }
        button.active {
            background: #4a6741;
            border-color: #06d6a0;
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
        }
        input[type=range] {
            flex: 1;
            accent-color: #ffd166;
        }
        .legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px 10px;
            font-size: 0.72rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <h1>SVO Pathfinding Demo</h1>
    <div class="subtitle">WebGL 2.0 GPGPU - Wavefront Propagation on Sparse Voxel Octree</div>

    <div class="main-container">
        <div class="viz-container">
            <canvas id="vizCanvas"></canvas>
            <div class="mode-badge" id="modeBadge">Orbit Mode</div>
        </div>
        <canvas id="glCanvas" width="1" height="1"></canvas>

        <div class="sidebar">
            <div class="panel" id="info">Loading...</div>

            <div class="panel">
                <b>Controls</b>
                <div style="margin-top:6px" class="controls">
                    <button id="btnRun">Run</button>
                    <button id="btnStep">Step</button>
                    <button id="btnReset">Reset</button>
                </div>
                <div style="margin-top:6px" class="controls">
                    <button id="btnOrbit" class="active">Orbit</button>
                    <button id="btnPlace">Place Start</button>
                </div>
            </div>

            <div class="panel">
                <div class="slider-row">
                    <span>Z-Slice:</span>
                    <input type="range" id="zSlider" min="0" max="15" value="8">
                    <span id="zValue">8</span>
                </div>
                <div style="margin-top:4px">
                    <label style="font-size:0.75rem">
                        <input type="checkbox" id="chkSlice" checked> Show Z-Slice plane
                    </label>
                </div>
            </div>

            <div class="panel">
                <b>Legend</b>
                <div class="legend" style="margin-top:4px">
                    <div class="legend-item"><div class="legend-color" style="background:#4a4a6a"></div>Wall</div>
                    <div class="legend-item"><div class="legend-color" style="background:#40916c"></div>Frontier</div>
                    <div class="legend-item"><div class="legend-color" style="background:#2d6a4f"></div>Visited</div>
                    <div class="legend-item"><div class="legend-color" style="background:#ffd166"></div>Path</div>
                    <div class="legend-item"><div class="legend-color" style="background:#06d6a0"></div>Start</div>
                    <div class="legend-item"><div class="legend-color" style="background:#ef476f"></div>Goal</div>
                </div>
            </div>

            <div class="panel" style="font-size:0.72rem; color:#888">
                <b>Tips</b><br>
                Orbit: drag to rotate, scroll to zoom<br>
                Place mode: click on Z-slice to set start/goal<br>
                Right-click: switch start/goal
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="./src/app.js"></script>
</body>
</html>
